services:
  - type: web
    name: imgexe-watermark-api
    runtime: node
    plan: starter
    buildCommand: |
      npm ci
      python -m pip install --upgrade pip
      python -m pip install -r requirements.txt
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: INPAINT_TIMEOUT_MS
        value: 60000
      - key: CORS_ALLOW_ORIGINS
        sync: false
